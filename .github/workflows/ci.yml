name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint || true # baseline lint warnings exist; not blocking
      - run: npm run test
      - run: npm run build
