name: Auto-tag main

# After a release lands on main, push a git tag matching package.json's
# version AND publish a GitHub Release for it (so the repo's homepage
# shows the "Latest" badge and listings are visible under /releases).
# Idempotent: existing tag/release is skipped.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Create tag if it doesn't exist
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse --quiet --verify "refs/tags/$tag" > /dev/null; then
            echo "Tag $tag already exists, skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Create GitHub Release if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $tag already exists, skipping."
            exit 0
          fi
          prev=$(git tag --sort=-creatordate | grep -v "^$tag$" | head -1 || true)
          if [ -n "$prev" ]; then
            notes=$(git log --pretty=format:'- %s' "$prev..HEAD")
            range="$prev → $tag"
          else
            notes=$(git log --pretty=format:'- %s' | head -20)
            range="initial → $tag"
          fi
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes "$(printf 'Released from \`main\` via auto-tag.yml.\n\n## Changes (%s)\n\n%s\n' "$range" "$notes")" \
            --latest

      - name: Summary
        run: |
          {
            echo "## 🏷️ Tagged \`${{ steps.version.outputs.tag }}\`"
            echo ""
            echo "GitHub Release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ steps.version.outputs.tag }}"
          } >> "$GITHUB_STEP_SUMMARY"
